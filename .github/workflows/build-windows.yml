name: Build PourSend Windows executable

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build PourSend portable Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest

      - name: Run syntax check
        run: python -m compileall main.py app core tests

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build executable
        run: pyinstaller --noconfirm --onefile --windowed --name PourSend main.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PourSend-Windows
          path: dist/PourSend.exe
          if-no-files-found: error
